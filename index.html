<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    color: #e8e4df;
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    overflow: hidden;
  }

  .container {
    max-width: 640px;
    width: 100%;
    padding: 0.75rem 0.5rem;
    text-align: left;
    position: relative;
  }

  .label {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #8a8479;
    margin-bottom: 2rem;
  }

  .word {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 2.2rem;
    color: #ede9e3;
    margin-bottom: 0.4rem;
    opacity: 0;
    transition: opacity 0.8s ease;
  }

  .word.visible { opacity: 1; }

  .phonetic {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 0.8rem;
    color: #6b6560;
    margin-bottom: 1.2rem;
    opacity: 0;
    transition: opacity 0.8s ease 0.1s;
  }

  .phonetic.visible { opacity: 1; }

  .part-of-speech {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #7a756e;
    margin-bottom: 0.8rem;
    opacity: 0;
    transition: opacity 0.8s ease 0.2s;
  }

  .part-of-speech.visible { opacity: 1; }

  .definition {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 0.95rem;
    line-height: 1.7;
    color: #b8b3ac;
    margin-bottom: 1rem;
    opacity: 0;
    transition: opacity 0.8s ease 0.3s;
  }

  .definition.visible { opacity: 1; }

  .example {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 1rem;
    line-height: 1.6;
    color: #9a9590;
    opacity: 0;
    transition: opacity 0.8s ease 0.4s;
  }

  .example.visible { opacity: 1; }

  .divider {
    width: 32px;
    height: 1px;
    background: #2a2725;
    margin: 1.5rem 0 0;
  }

  .error {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 0.85rem;
    color: #6b6560;
  }
</style>
</head>

<div class="container">
  <div class="label">Word of the Day</div>

function getDayOfYear() {
  const now = new Date();
  const start = new Date(now.getFullYear(), 0, 0);
  const diff = now - start;
  return Math.floor(diff / (1000 * 60 * 60 * 24));
}

function getTodaysWord() {
  const day = getDayOfYear();
  return words[day % words.length];
}

async function fetchDefinition(word) {
  try {
    const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`);
    if (!res.ok) return null;
    const data = await res.json();
    return data[0] || null;
  } catch {
    return null;
  }
}

function showElements() {
  document.querySelectorAll('.word, .phonetic, .part-of-speech, .definition, .example')
    .forEach(el => el.classList.add('visible'));
}

function showFallback(word) {
  document.getElementById('word').textContent = word;
  document.getElementById('phonetic').textContent = '';
  document.getElementById('pos').textContent = '';
  document.getElementById('definition').textContent = 'Look this one up — it\'s worth knowing.';
  document.getElementById('example').textContent = '';
  showElements();
}

async function init() {
  const word = getTodaysWord();
  const data = await fetchDefinition(word);

  const wordEl = document.getElementById('word');
  const phoneticEl = document.getElementById('phonetic');
  const posEl = document.getElementById('pos');
  const defEl = document.getElementById('definition');
  const exampleEl = document.getElementById('example');

  if (!data) {
    showFallback(word);
    return;
  }

  wordEl.textContent = data.word || word;

  // Phonetic
  const phonetic = data.phonetic || (data.phonetics && data.phonetics.find(p => p.text))?.text || '';
  phoneticEl.textContent = phonetic;

  // First meaning
  const meaning = data.meanings && data.meanings[0];
  if (meaning) {
    posEl.textContent = meaning.partOfSpeech || '';

    const def = meaning.definitions && meaning.definitions[0];
    if (def) {
      defEl.textContent = def.definition || '';
      if (def.example) {
        exampleEl.textContent = `"${def.example}"`;
      }
    }
  }

  showElements();
}

init();
